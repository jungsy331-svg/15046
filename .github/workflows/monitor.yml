name: 청년안심주택 민간임대 공고 모니터링

on:
  schedule:
    - cron: "0 4 * * *"   # 매일 오후 1시 KST (UTC 04:00)
  workflow_dispatch:        # 수동 실행만 허용 (push 트리거 제거)

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 모니터링 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: seen_posts.json 커밋 (상태 저장)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_posts.json || true
          git diff --cached --quiet || git commit -m "chore: update seen posts [skip ci]"
          git push || true
